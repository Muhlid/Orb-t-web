<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIT | Welcome Messages Config</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="dashboard-body">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-satellite-dish"></i> ORBIT
            </div>
            <div class="sidebar-menu">
                <p class="menu-label">SERVER MANAGEMENT</p>
                <a href="dashboard.html" class="menu-item active"><i class="fa-solid fa-chart-pie"></i> Overview</a>
                <a href="#" class="menu-item"><i class="fa-solid fa-shield-halved"></i> Moderation</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="server-info">
                    <div class="server-icon"><i class="fa-brands fa-discord"></i></div>
                    <h2>My Awesome Server</h2>
                </div>
            </header>

            <div class="dashboard-container config-container">
                <div class="page-header config-header">
                    <div>
                        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Modules</a>
                        <h1><i class="fa-solid fa-hand-sparkles" style="color: #ffbd2e; margin-right: 10px;"></i> Welcome Messages</h1>
                    </div>
                </div>

                <div class="config-card">
                    <form>
                        <div class="form-group">
                            <label>Welcome Channel</label>
                            <select class="form-control">
                                <option value="welcome" selected># welcome</option>
                                <option value="general"># general</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Greeting Message</label>
                            <textarea class="form-control" rows="4">Hey {user}, welcome to **{server}**!</textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
<script src="dashboard.js"></script>
</body>
</html>
